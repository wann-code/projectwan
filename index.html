<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberDino 2077: ProjectWann Fixed Edition</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0c1d;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 800 / 450;
            background-color: #111;
            border: 4px solid #000; 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #mobileControls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            padding: 15px;
            gap: 20px;
        }
        .btn {
            flex: 1;
            height: 65px;
            background: #1a1a2e;
            border: 3px solid #000;
            border-radius: 8px;
            color: #bdc3c7;
            font-size: 18px;
            font-weight: bold;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 4px 4px 0px #000;
        }
        #btnDuck {
            border-color: #000;
            background: #34495e;
            color: #fff;
        }
        #btnJump {
            border-color: #000;
            background: #d81b60;
            color: #fff;
        }
        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>

    <div id="mobileControls">
        <button class="btn" id="btnDuck">TUNDUK (HOLD)</button>
        <button class="btn" id="btnJump">LOMPAT (TAP)</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const LEBAR_LAYAR = 800;
        const TINGGI_LAYAR = 450;
        const y_tanah_lintasan = TINGGI_LAYAR - 100;

        // WARNA COMIC FLAT STYLE FUTURE
        const WARNA_HITAM = "#000000";
        const WARNA_PUTIH = "#FFFFFF";
        const WARNA_BG_FUTURE = "#0a0a16"; 
        const WARNA_GEDUNG_FUTURE = "#1e1e38"; 
        const WARNA_GEDUNG_FAJAR = "#381d47"; 
        const WARNA_JENDELA = "#00ffcc"; 
        const WARNA_MAGENTA_FLAT = "#d81b60";
        const WARNA_CYAN_FLAT = "#00acc1";
        const WARNA_ORANYE = "#ff6e00";
        const WARNA_KUNING = "#f1c40f";

        // DATA STATE UTAMA GAME
        let status_layar = "MENU"; 
        let kecepatan_game_awal = 5.0; 
        let kecepatan_game = kecepatan_game_awal;
        let skor_jarak = 0;
        let skor = 0;
        let skor_tertinggi = 0;
        let waktu_berjalan = 0;
        let scroll_semesta = 0;
        let is_overdrive = false;

        // DATA UTAMA KOIN
        let total_koin = parseInt(localStorage.getItem("p_wann_koin")) || 0;

        // DATA CHARACTER SHOP
        let daftar_kepemilikan = JSON.parse(localStorage.getItem("p_wann_skins")) || [true, false, false, false, false, false, false, false, false, false];
        let id_karakter_terpilih = parseInt(localStorage.getItem("p_wann_active_id")) || 0;
        let id_character_di_menu = id_karakter_terpilih;

        const database_karakter = [
            { id: 0, nama: "Dino Steel", harga: 0, tipe: "Reguler", warna: "#bdc3c7", warnaAksen: "#00acc1" },
            { id: 1, nama: "Neon Viper", harga: 50, tipe: "Reguler", warna: "#2ecc71", warnaAksen: "#d81b60" },
            { id: 2, nama: "Mecha Crimson", harga: 100, tipe: "Reguler", warna: "#e74c3c", warnaAksen: "#2c3e50" },
            { id: 3, nama: "Cyber Panther", harga: 150, tipe: "Reguler", warna: "#34495e", warnaAksen: "#3498db" },
            { id: 4, nama: "Mecha Bunny", harga: 200, tipe: "Reguler", warna: "#ecf0f1", warnaAksen: "#ff79c6" },
            { id: 5, nama: "Robo Shark", harga: 250, tipe: "Reguler", warna: "#1abc9c", warnaAksen: "#e67e22" },
            { id: 6, nama: "Shadow Wolf", harga: 300, tipe: "Reguler", warna: "#2c3e50", warnaAksen: "#e74c3c" },
            { id: 7, nama: "Mecha Gundam-01", harga: 500, tipe: "SPESIAL", warna: "#3498db", warnaAksen: "#f1c40f" },
            { id: 8, nama: "Cyber Shinobi", harga: 750, tipe: "SPESIAL", warna: "#2b2b2b", warnaAksen: "#d81b60" },
            { id: 9, nama: "The Wann-Bot", harga: 1000, tipe: "SPESIAL", warna: "#9b59b6", warnaAksen: "#00acc1" }
        ];

        const dino_lebar = 50;
        const dino_tinggi_normal = 56;
        const dino_tinggi_tunduk = 34;
        let dino_ting = dino_tinggi_normal;

        let dino_x = 90;
        let dino_y = y_tanah_lintasan - dino_tinggi_normal;
        let kecepatan_y = 0;
        let gravitasi = 0.85;
        let kekuatan_lompat = -14.5;
        let bisa_lompat = true;
        let menunduk = false;

        let daftar_rintangan = [];
        let daftar_puing = [];
        let daftar_koin_jalan = [];
        let partikel_ledakan = [];
        let partikel_roket = [];

        // ==========================================
        // AUDIO SYNTHESIZER ENGINE PROSEDURAL
        // ==========================================
        let audioCtx = null;

        function inisialisasiAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function mainkanSuaraMenuKlik() {
            inisialisasiAudio();
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = "sine";
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function mainkanSuaraSuksesBeli() {
            inisialisasiAudio();
            if (!audioCtx) return;
            let waktu = audioCtx.currentTime;
            
            let osc1 = audioCtx.createOscillator();
            let gain1 = audioCtx.createGain();
            osc1.connect(gain1); gain1.connect(audioCtx.destination);
            osc1.type = "triangle";
            osc1.frequency.setValueAtTime(400, waktu);
            gain1.gain.setValueAtTime(0.12, waktu);
            gain1.gain.exponentialRampToValueAtTime(0.01, waktu + 0.1);
            osc1.start(); osc1.stop(waktu + 0.1);

            setTimeout(() => {
                let osc2 = audioCtx.createOscillator();
                let gain2 = audioCtx.createGain();
                osc2.connect(gain2); gain2.connect(audioCtx.destination);
                osc2.type = "triangle";
                osc2.frequency.setValueAtTime(600, audioCtx.currentTime);
                gain2.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc2.start(); osc2.stop(audioCtx.currentTime + 0.15);
            }, 70);
        }

        function mainkanSuaraGagalBeli() {
            inisialisasiAudio();
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = "sawtooth";
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        }

        function mainkanSuaraLompat() {
            inisialisasiAudio();
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = "triangle";
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        function mainkanSuaraLedakanKalah() {
            inisialisasiAudio();
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = "sawtooth";
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        // Data Gedung Masa Depan
        let data_gedung = [];
        for (let i = 0; i < 12; i++) {
            let lebarGedung = 90 + Math.floor(Math.random() * 45);
            let tinggiGedung = 200 + Math.floor(Math.random() * 90); 
            let susunanJendela = [];
            for (let wy = (y_tanah_lintasan - tinggiGedung) + 30; wy < y_tanah_lintasan - 20; wy += 35) {
                for (let wx = 15; wx < lebarGedung - 20; wx += 25) {
                    if (Math.random() > 0.3) {
                        susunanJendela.push({ relX: wx, y: wy });
                    }
                }
            }
            data_gedung.push({ x_ratio: i * 160, lebar: lebarGedung, tinggi: tinggiGedung, jendela: susunanJendela });
        }

        class Rintangan {
            constructor(x, tipeKategori = "bawah") {
                this.tipe_kategori = tipeKategori;
                if (tipeKategori === "bawah") {
                    let sub = ["tunggal", "ganda", "tembok"][Math.floor(Math.random() * 3)];
                    if (sub === "tunggal") {
                        this.tipe = "laser_tunggal"; this.lebar = 24; this.tinggi = 55 + Math.floor(Math.random() * 15);
                    } else if (sub === "ganda") {
                        this.tipe = "laser_ganda"; this.lebar = 48; this.tinggi = 52;
                    } else {
                        this.tipe = "tembok_baja"; this.lebar = 38; this.tinggi = 42;
                    }
                    this.x = x; this.y = y_tanah_lintasan - this.tinggi;
                } else {
                    this.tipe = "terbang"; this.lebar = 48; this.tinggi = 32; this.x = x;
                    this.y = Math.random() > 0.5 ? y_tanah_lintasan - 80 : y_tanah_lintasan - 50;
                }
            }
        }

        class KoinObjek {
            constructor(x) {
                this.x = x;
                this.y = y_tanah_lintasan - 35 - Math.floor(Math.random() * 60);
                this.lebar = 22;
                this.tinggi = 22;
            }
        }

        function buatRintanganBaru() {
            let kategori = (skor >= 500 && Math.random() > 0.5) ? "atas" : "bawah";
            return new Rintangan(LEBAR_LAYAR + 100, kategori);
        }

        function gambarModelKarakter(ctx, x, y, id, isNunduk, tick) {
            ctx.save();
            ctx.strokeStyle = WARNA_HITAM;
            ctx.lineWidth = 3;
            let c = database_karakter[id];

            if (id <= 2 || id === 5 || id === 6) { 
                ctx.fillStyle = c.warna;
                if (!isNunduk) {
                    ctx.fillRect(x, y + 14, 34, 26); ctx.strokeRect(x, y + 14, 34, 26);
                    ctx.fillStyle = c.warna;
                    ctx.fillRect(x + 18, y - 4, 32, 22); ctx.strokeRect(x + 18, y - 4, 32, 22);
                    ctx.fillStyle = c.warnaAksen; ctx.fillRect(x + 36, y + 12, 5, 5); ctx.fillRect(x + 44, y + 12, 5, 5);
                    ctx.fillStyle = c.warnaAksen; ctx.beginPath(); ctx.arc(x + 36, y + 3, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = WARNA_METAL_TUA; ctx.beginPath(); ctx.moveTo(x, y + 24); ctx.lineTo(x - 16, y + 16); ctx.lineTo(x - 10, y + 34); ctx.closePath(); ctx.fill(); ctx.stroke();
                } else {
                    ctx.fillRect(x - 2, y + 8, 42, 20); ctx.strokeRect(x - 2, y + 8, 42, 20);
                    ctx.fillRect(x + 32, y + 4, 24, 18); ctx.strokeRect(x + 32, y + 4, 24, 18);
                    ctx.fillStyle = c.warnaAksen; ctx.fillRect(x + 48, y + 16, 5, 4);
                    ctx.fillStyle = c.warnaAksen; ctx.beginPath(); ctx.arc(x + 44, y + 8, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = WARNA_METAL_TUA; ctx.beginPath(); ctx.moveTo(x - 2, y + 14); ctx.lineTo(x - 16, y + 22); ctx.lineTo(x - 2, y + 24); ctx.closePath(); ctx.fill(); ctx.stroke();
                }
            } 
            else if (id === 3) { 
                ctx.fillStyle = c.warna;
                if (!isNunduk) {
                    ctx.fillRect(x, y + 16, 46, 24); ctx.strokeRect(x, y + 16, 46, 24);
                    ctx.fillRect(x + 26, y + 2, 20, 16); ctx.strokeRect(x + 26, y + 2, 20, 16);
                    ctx.fillRect(x + 28, y - 4, 5, 6); ctx.fillRect(x + 38, y - 4, 5, 6);
                    ctx.fillStyle = c.warnaAksen; ctx.beginPath(); ctx.arc(x + 38, y + 8, 4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                } else {
                    ctx.fillRect(x - 4, y + 10, 52, 18); ctx.strokeRect(x - 4, y + 10, 52, 18);
                    ctx.fillRect(x + 34, y + 2, 18, 12); ctx.strokeRect(x + 34, y + 2, 18, 12);
                    ctx.fillStyle = c.warnaAksen; ctx.beginPath(); ctx.arc(x + 44, y + 6, 4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                }
            } 
            else if (id === 4) { 
                ctx.fillStyle = c.warna;
                if (!isNunduk) {
                    ctx.fillRect(x + 4, y + 18, 32, 24); ctx.strokeRect(x + 4, y + 18, 32, 24);
                    ctx.fillRect(x + 16, y + 4, 20, 16); ctx.strokeRect(x + 16, y + 4, 20, 16);
                    ctx.fillStyle = c.warnaAksen; ctx.fillRect(x + 20, y - 14, 5, 18); ctx.fillRect(x + 28, y - 14, 5, 18); ctx.strokeRect(x + 20, y - 14, 5, 18); ctx.strokeRect(x + 28, y - 14, 5, 18);
                    ctx.fillStyle = c.warnaAksen; ctx.beginPath(); ctx.arc(x + 28, y + 10, 4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                } else {
                    ctx.fillRect(x - 2, y + 10, 44, 18); ctx.strokeRect(x - 2, y + 10, 44, 18);
                    ctx.fillRect(x + 26, y + 4, 16, 12); ctx.strokeRect(x + 26, y + 4, 16, 12);
                    ctx.fillStyle = c.warnaAksen; ctx.fillRect(x + 14, y + 6, 12, 4); ctx.strokeRect(x + 14, y + 6, 12, 4);
                }
            } 
            else if (id === 7) { 
                ctx.fillStyle = "#ecf0f1";
                if (!isNunduk) {
                    ctx.fillRect(x + 8, y + 16, 26, 26); ctx.strokeRect(x + 8, y + 16, 26, 26);
                    ctx.fillStyle = "#3498db"; ctx.fillRect(x + 12, y + 20, 18, 10);
                    ctx.fillStyle = "#ecf0f1"; ctx.fillRect(x + 13, y + 2, 16, 14); ctx.strokeRect(x + 13, y + 2, 16, 14);
                    ctx.fillStyle = c.warnaAksen;
                    ctx.beginPath(); ctx.moveTo(x + 21, y + 2); ctx.lineTo(x + 10, y - 10); ctx.lineTo(x + 21, y - 2); ctx.lineTo(x + 32, y - 10); ctx.lineTo(x + 21, y + 2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = "#2ecc71"; ctx.fillRect(x + 20, y + 6, 6, 3);
                } else {
                    ctx.fillRect(x + 2, y + 10, 36, 18); ctx.strokeRect(x + 2, y + 10, 36, 18);
                    ctx.fillRect(x + 24, y + 2, 14, 12); ctx.strokeRect(x + 24, y + 2, 14, 12);
                    ctx.fillStyle = "#2ecc71"; ctx.fillRect(x + 30, y + 5, 4, 3);
                }
            } 
            else if (id === 8) { 
                ctx.fillStyle = c.warna;
                if (!isNunduk) {
                    ctx.fillRect(x + 6, y + 14, 28, 28); ctx.strokeRect(x + 6, y + 14, 28, 28);
                    ctx.fillRect(x + 12, y, 20, 16); ctx.strokeRect(x + 12, y, 20, 16);
                    ctx.fillStyle = "#fff"; ctx.fillRect(x + 18, y + 4, 12, 4);
                    ctx.fillStyle = "#e74c3c";
                    ctx.fillRect(x - 14 + (Math.sin(tick*0.2)*4), y + 14, 20, 8); ctx.strokeRect(x - 14 + (Math.sin(tick*0.2)*4), y + 14, 20, 8);
                } else {
                    ctx.fillRect(x, y + 8, 38, 20); ctx.strokeRect(x, y + 8, 38, 20);
                    ctx.fillRect(x + 20, y, 18, 12); ctx.strokeRect(x + 20, y, 18, 12);
                    ctx.fillStyle = "#fff"; ctx.fillRect(x + 26, y + 4, 8, 3);
                    ctx.fillStyle = "#e74c3c"; ctx.fillRect(x - 8, y + 10, 12, 6);
                }
            } 
            else if (id === 9) { 
                ctx.fillStyle = c.warna;
                let ayunDrone = Math.sin(tick * 0.15) * 5;
                if (!isNunduk) {
                    ctx.beginPath(); ctx.arc(x + 22, y + 20 + ayunDrone, 20, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = c.warnaAksen; ctx.beginPath(); ctx.arc(x + 22, y + 20 + ayunDrone, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = WARNA_HITAM; ctx.fillRect(x - 4, y + 16 + ayunDrone, 6, 8); ctx.fillRect(x + 42, y + 16 + ayunDrone, 6, 8);
                } else {
                    ctx.beginPath(); ctx.arc(x + 22, y + 14, 14, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = c.warnaAksen; ctx.beginPath(); ctx.arc(x + 22, y + 14, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                }
            }

            if (id !== 9) {
                ctx.fillStyle = WARNA_METAL_TUA; ctx.strokeStyle = WARNA_HITAM; ctx.lineWidth = 2.5;
                let ayun = (dino_y === (y_tanah_lintasan - dino_ting) && status_layar === "BERMAIN") ? Math.sin(tick * 0.35) * 6 : 0;
                ctx.fillRect(x + 8, y + dino_ting - 14, 9, 11 + ayun); ctx.strokeRect(x + 8, y + dino_ting - 14, 9, 11 + ayun);
                ctx.fillRect(x + 22, y + dino_ting - 14, 9, 11 - ayun); ctx.strokeRect(x + 22, y + dino_ting - 14, 9, 11 - ayun);
            }
            ctx.restore();
        }

        function renderKomponenGame() {
            ctx.clearRect(0, 0, LEBAR_LAYAR, TINGGI_LAYAR);
            ctx.save();
            
            ctx.fillStyle = (status_layar === "BERMAIN" && skor >= 200) ? WARNA_GEDUNG_FAJAR : WARNA_BG_FUTURE;
            ctx.fillRect(0, 0, LEBAR_LAYAR, TINGGI_LAYAR);

            ctx.lineWidth = 3; ctx.strokeStyle = WARNA_HITAM;
            let scroll_dekat = (waktu_berjalan * kecepatan_game * 0.05) % 1600;
            data_gedung.forEach((g, idx) => {
                let cx = (idx * 160) - scroll_dekat;
                if (cx < -180) cx += 1600;
                let cy = y_tanah_lintasan - g.tinggi;
                
                ctx.fillStyle = (status_layar === "BERMAIN" && skor >= 200) ? "#2b143a" : WARNA_GEDUNG_FUTURE;
                ctx.fillRect(cx, cy, g.lebar, g.tinggi);
                ctx.strokeRect(cx, cy, g.lebar, g.tinggi);

                ctx.fillStyle = WARNA_JENDELA; ctx.strokeStyle = WARNA_HITAM; ctx.lineWidth = 1.5;
                g.jendela.forEach(j => {
                    ctx.fillRect(cx + j.relX, j.y, 6, 22); ctx.strokeRect(cx + j.relX, j.y, 6, 22);
                });
            });

            // ULTRAMAN VS KAIJU BERWARNA
            if ((status_layar === "BERMAIN" || status_layar === "GAMEOVER") && skor >= 100) {
                let bx = 530, by = y_tanah_lintasan;
                let ayun_u = Math.sin(waktu_berjalan * 0.08) * 4;
                let ayun_m = Math.cos(waktu_berjalan * 0.07) * 5;
                let fase_serang = waktu_berjalan % 180;

                ctx.lineWidth = 3; ctx.strokeStyle = WARNA_HITAM;

                let mx = bx + 90 + ayun_m, my = by - 125;
                ctx.fillStyle = "#1e4d2b"; ctx.fillRect(mx + 40, by - 35, 30, 35); ctx.strokeRect(mx + 40, by - 35, 30, 35);
                ctx.beginPath(); ctx.ellipse(mx + 30, my + 65, 36, 45, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = WARNA_ORANYE;
                ctx.beginPath(); ctx.moveTo(mx + 60, my + 40); ctx.lineTo(mx + 75, my + 30); ctx.lineTo(mx + 64, my + 55); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(mx + 55, my + 70); ctx.lineTo(mx + 72, my + 65); ctx.lineTo(mx + 58, my + 85); ctx.fill(); ctx.stroke();
                ctx.fillStyle = "#1e4d2b"; ctx.beginPath(); ctx.arc(mx + 20, my + 25, 20, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = WARNA_MAGENTA_FLAT; ctx.fillRect(mx + 10, my + 20, 5, 5);
                ctx.fillStyle = WARNA_PUTIH; ctx.fillRect(mx + 6, my + 30, 6, 4);

                let ux = bx + ayun_u, uy = by - 135;
                ctx.fillStyle = "#dcdde1"; ctx.fillRect(ux + 12, uy + 80, 12, 55); ctx.strokeRect(ux + 12, uy + 80, 12, 55);
                ctx.fillRect(ux + 28, uy + 80, 12, 55); ctx.strokeRect(ux + 28, uy + 80, 12, 55);
                ctx.fillRect(ux + 10, uy + 30, 32, 50); ctx.strokeRect(ux + 10, uy + 30, 32, 50);
                ctx.fillStyle = "#c23616"; ctx.fillRect(ux + 10, uy + 40, 8, 40); ctx.fillRect(ux + 34, uy + 40, 8, 40); ctx.fillRect(ux + 18, uy + 70, 16, 10);
                ctx.fillStyle = "#00ffff"; ctx.beginPath(); ctx.arc(ux + 26, uy + 45, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = "#dcdde1"; ctx.beginPath(); ctx.ellipse(ux + 26, uy + 12, 16, 20, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = "#c23616"; ctx.fillRect(ux + 24, uy - 6, 4, 20); 
                ctx.fillStyle = "#f1c40f";
                ctx.beginPath(); ctx.ellipse(ux + 19, uy + 12, 5, 7, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.ellipse(ux + 33, uy + 12, 5, 7, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

                if (fase_serang > 130 && fase_serang < 170) {
                    ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 6;
                    ctx.beginPath(); ctx.moveTo(ux + 40, uy + 50); ctx.lineTo(mx + 10, uy + 50); ctx.stroke();
                    ctx.strokeStyle = WARNA_PUTIH; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(ux + 40, uy + 50); ctx.lineTo(mx + 10, uy + 50); ctx.stroke();
                }
            }

            // Watermark
            ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
            ctx.font = "bold 50px 'Courier New'";
            let mt = ctx.measureText("projectwann");
            ctx.fillText("projectwann", LEBAR_LAYAR/2 - mt.width/2, 200);

            // Aspal Jalan
            ctx.fillStyle = "#111"; ctx.fillRect(0, y_tanah_lintasan, LEBAR_LAYAR, 100);
            ctx.strokeStyle = WARNA_HITAM; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, y_tanah_lintasan); ctx.lineTo(LEBAR_LAYAR, y_tanah_lintasan); ctx.stroke();
            
            ctx.strokeStyle = "#333"; ctx.lineWidth = 2;
            let offset = scroll_semesta % 50;
            for (let x = -offset; x < LEBAR_LAYAR + 50; x += 50) {
                ctx.beginPath(); ctx.moveTo(x, y_tanah_lintasan); ctx.lineTo(x - 50, TINGGI_LAYAR); ctx.stroke();
            }

            // MENU TOKO UTAMA (SHOP MENU)
            if (status_layar === "MENU") {
                ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(0, 0, LEBAR_LAYAR, TINGGI_LAYAR);

                ctx.fillStyle = WARNA_MAGENTA_FLAT; ctx.font = "bold 42px 'Courier New'"; ctx.strokeStyle = WARNA_HITAM; ctx.lineWidth = 4;
                ctx.fillText("PROJECTWANN MECHA RACE", LEBAR_LAYAR/2 - 240, 60);
                ctx.strokeText("PROJECTWANN MECHA RACE", LEBAR_LAYAR/2 - 240, 60);

                ctx.fillStyle = "#2c3e50"; ctx.lineWidth = 4; ctx.strokeStyle = WARNA_HITAM;
                ctx.fillRect(LEBAR_LAYAR/2 - 130, 100, 260, 180); ctx.strokeRect(LEBAR_LAYAR/2 - 130, 100, 260, 180);

                gambarModelKarakter(ctx, LEBAR_LAYAR/2 - 25, 180, id_character_di_menu, false, waktu_berjalan);

                let mecha_skrg = database_karakter[id_character_di_menu];
                ctx.fillStyle = WARNA_PUTIH; ctx.font = "bold 18px 'Courier New'";
                ctx.fillText(mecha_skrg.nama, LEBAR_LAYAR/2 - ctx.measureText(mecha_skrg.nama).width/2, 245);
                
                ctx.fillStyle = mecha_skrg.tipe === "SPESIAL" ? WARNA_ORANYE : WARNA_CYAN_FLAT;
                ctx.font = "bold 14px 'Courier New'";
                ctx.fillText(`CLASS: ${mecha_skrg.tipe}`, LEBAR_LAYAR/2 - ctx.measureText(`CLASS: ${mecha_skrg.tipe}`).width/2, 265);

                ctx.fillStyle = WARNA_PUTIH; ctx.font = "bold 32px 'Courier New'";
                ctx.fillText("◀", LEBAR_LAYAR/2 - 175, 205);
                ctx.fillText("▶", LEBAR_LAYAR/2 + 145, 205);

                let sudahPunya = daftar_kepemilikan[id_character_di_menu];
                if (sudahPunya) {
                    if (id_character_di_menu === id_karakter_terpilih) {
                        ctx.fillStyle = "#2ecc71"; ctx.font = "bold 18px 'Courier New'";
                        ctx.fillText("[ MECHA SET ACTIVE ]", LEBAR_LAYAR/2 - 100, 315);
                    } else {
                        ctx.fillStyle = WARNA_KUNING; ctx.font = "bold 18px 'Courier New'";
                        ctx.fillText("TAP SCREEN TO EQUIP", LEBAR_LAYAR/2 - 100, 315);
                    }
                } else {
                    ctx.fillStyle = WARNA_MAGENTA_FLAT; ctx.font = "bold 18px 'Courier New'";
                    ctx.fillText(`BUY: 🪙 ${mecha_skrg.harga} COINS`, LEBAR_LAYAR/2 - 95, 315);
                }

                ctx.fillStyle = WARNA_KUNING; ctx.font = "bold 20px 'Courier New'";
                ctx.fillText(`🪙 COINS: ${total_koin}`, 25, 35);

                ctx.fillStyle = WARNA_PUTIH; ctx.font = "bold 16px 'Courier New'";
                ctx.fillText("PRESS [JUMP BUTTON] TO START THE MISSION", LEBAR_LAYAR/2 - 180, 390);
            }

            // GAMEPLAY SECTION
            if (status_layar === "BERMAIN" || status_layar === "GAMEOVER") {
                daftar_koin_jalan.forEach(c => {
                    ctx.fillStyle = WARNA_KUNING; ctx.strokeStyle = WARNA_HITAM; ctx.lineWidth = 2.5;
                    ctx.beginPath(); ctx.arc(c.x + 11, c.y + 11, 11, 0, Math.PI*2); ctx.fill(); stroke();
                    ctx.fillStyle = WARNA_HITAM; ctx.font = "bold 13px 'Courier New'"; ctx.fillText("C", c.x + 7, c.y + 15);
                });

                ctx.strokeStyle = WARNA_HITAM; ctx.lineWidth = 3;
                daftar_rintangan.forEach(obs => {
                    if (obs.tipe === "laser_tunggal") {
                        ctx.fillStyle = WARNA_MAGENTA_FLAT; ctx.fillRect(obs.x + 4, obs.y, obs.lebar - 8, obs.tinggi); ctx.strokeRect(obs.x + 4, obs.y, obs.lebar - 8, obs.tinggi);
                        ctx.fillStyle = WARNA_PUTIH; ctx.fillRect(obs.x + 9, obs.y + 6, obs.lebar - 18, obs.tinggi - 12);
                    } else if (obs.tipe === "laser_ganda") {
                        ctx.fillStyle = WARNA_MAGENTA_FLAT; 
                        ctx.fillRect(obs.x, obs.y, 18, obs.tinggi); ctx.strokeRect(obs.x, obs.y, 18, obs.tinggi);
                        ctx.fillRect(obs.x + obs.lebar - 18, obs.y, 18, obs.tinggi); ctx.strokeRect(obs.x + obs.lebar - 18, obs.y, 18, obs.tinggi);
                    } else if (obs.tipe === "tembok_baja") {
                        ctx.fillStyle = WARNA_METAL_TUA; ctx.fillRect(obs.x, obs.y, obs.lebar, obs.tinggi); ctx.strokeRect(obs.x, obs.y, obs.lebar, obs.tinggi);
                        ctx.fillStyle = WARNA_ORANYE; ctx.beginPath(); ctx.arc(obs.x + obs.lebar/2, obs.y + obs.tinggi/2, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    } else if (obs.tipe === "terbang") {
                        ctx.fillStyle = WARNA_METAL_TUA; ctx.fillRect(obs.x, obs.y, obs.lebar, obs.tinggi); ctx.strokeRect(obs.x, obs.y, obs.lebar, obs.tinggi);
                        ctx.fillStyle = WARNA_CYAN_FLAT; ctx.beginPath(); ctx.arc(obs.x + 10, obs.y + obs.tinggi/2, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    }
                });

                daftar_puing.forEach(p => {
                    ctx.fillStyle = WARNA_ORANYE; ctx.strokeStyle = WARNA_HITAM; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size/2, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                });

                partikel_roket.forEach(p => { ctx.fillStyle = p.warna; ctx.fillRect(p.x, p.y, p.size, p.size); });

                if (status_layar === "BERMAIN") {
                    gambarModelKarakter(ctx, dino_x, dino_y, id_karakter_terpilih, menunduk, waktu_berjalan);
                } else {
                    partikel_ledakan.forEach(p => { ctx.fillStyle = p.warna; ctx.fillRect(p.x, p.y, p.size, p.size); });
                }

                ctx.fillStyle = (skor < 100) ? WARNA_CYAN_FLAT : WARNA_PUTIH;
                ctx.font = "bold 18px 'Courier New'"; ctx.fillText(`STEPS: ${String(skor).padStart(4, '0')} m`, 25, 35);
                ctx.fillStyle = WARNA_KUNING; ctx.fillText(`🪙 COINS: ${total_koin}`, 25, 60);
                ctx.fillStyle = "#7882a0"; ctx.fillText(`MAX: ${String(skor_tertinggi).padStart(4, '0')} m`, 25, 85);

                if (is_overdrive && status_layar === "BERMAIN") {
                    ctx.fillStyle = WARNA_KUNING; ctx.font = "bold 16px 'Courier New'";
                    ctx.fillText("⚡ SPEED BOOST ACTIVE! ⚡", LEBAR_LAYAR/2 - 100, 45);
                }
            }

            if (status_layar === "GAMEOVER") {
                ctx.fillStyle = "rgba(0, 0, 0, 0.85)"; ctx.fillRect(0, 0, LEBAR_LAYAR, TINGGI_LAYAR);
                ctx.fillStyle = WARNA_MAGENTA_FLAT; ctx.font = "bold 38px 'Courier New'";
                ctx.fillText("CRITICAL REBOOT REQUIRED", LEBAR_LAYAR/2 - 250, TINGGI_LAYAR/2 - 15);
                ctx.fillStyle = WARNA_CYAN_FLAT; ctx.font = "bold 18px 'Courier New'";
                ctx.fillText("> PRESS [JUMP BUTTON] TO RETURN TO STORE <", LEBAR_LAYAR/2 - 235, TINGGI_LAYAR/2 + 35);
            }

            ctx.restore();
        }

        function updateSiklusFisika() {
            waktu_berjalan++;
            if (status_layar !== "BERMAIN") {
                if (status_layar === "GAMEOVER") {
                    partikel_ledakan.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--; });
                }
                return; 
            }

            if (skor >= 200) is_overdrive = true;
            else is_overdrive = false;

            // Balanced Speed
            let speed_aktif = kecepatan_game + (is_overdrive ? 3.2 : 0);
            scroll_semesta += speed_aktif;
            skor_jarak += speed_aktif * 0.02;
            skor = Math.floor(skor_jarak);

            if (skor > 0 && skor % 100 === 0) {
                kecepatan_game = kecepatan_game_awal + (skor / 180.0);
            }

            kecepatan_y += gravitasi;
            dino_y += kecepatan_y;
            let batas = y_tanah_lintasan - dino_ting;
            if (dino_y >= batas) {
                dino_y = batas; kecepatan_y = 0; bisa_lompat = true;
            }

            // Jet Particles
            if (dino_y < batas && !menunduk) {
                let jlhPartikel = id_karakter_terpilih === 8 ? 1 : 2;
                for(let k=0; k < jlhPartikel; k++) {
                    let warnaJet = (id_karakter_terpilih === 8) ? "#555" : (Math.random() > 0.4 ? WARNA_ORANYE : WARNA_KUNING);
                    partikel_roket.push({
                        x: dino_x + 5, y: dino_y + 28 + Math.random()*8,
                        vx: - (2 + Math.random()*3), vy: 1 + Math.random()*2,
                        warna: warnaJet, size: randomRange(3, 5), life: randomRange(8, 12)
                    });
                }
            }
            for (let i = partikel_roket.length - 1; i >= 0; i--) {
                let p = partikel_roket[i]; p.x += p.vx; p.y += p.vy; p.life--;
                if (p.life <= 0) partikel_roket.splice(i, 1);
            }

            // Koin Spawning
            if (Math.random() < 0.015 && daftar_koin_jalan.length < 5) {
                daftar_koin_jalan.push(new KoinObjek(LEBAR_LAYAR + 50));
            }
            for (let i = daftar_koin_jalan.length - 1; i >= 0; i--) {
                let c = daftar_koin_jalan[i]; c.x -= speed_aktif;
                if (c.x + c.lebar < 0) { daftar_koin_jalan.splice(i, 1); continue; }
                if (cekTabrakan(dino_x, dino_y, dino_lebar, dino_ting, c.x, c.y, c.lebar, c.tinggi)) {
                    total_koin += 1;
                    localStorage.setItem("p_wann_koin", total_koin);
                    daftar_koin_jalan.splice(i, 1);
                }
            }

            // Meteor Spawning
            if (skor >= 300 && Math.random() < 0.015 && daftar_puing.length < 3) {
                daftar_puing.push({
                    size: 10 + Math.floor(Math.random()*6), x: 400 + Math.random()*500, y: -20,
                    vx: -5 - Math.random()*2, vy: 5 + Math.random()*2
                });
            }
            for (let i = daftar_puing.length - 1; i >= 0; i--) {
                let p = daftar_puing[i]; p.x += p.vx; p.y += p.vy;
                if (p.y > TINGGI_LAYAR || p.x < 0) { daftar_puing.splice(i, 1); continue; }
                if(cekTabrakan(dino_x, dino_y, dino_lebar, dino_ting, p.x, p.y, p.size, p.size)) { picuKekalahan(); break; }
            }

            // Rintangan Laser
            for (let i = daftar_rintangan.length - 1; i >= 0; i--) {
                let obs = daftar_rintangan[i]; obs.x -= speed_aktif;
                if (obs.x + obs.lebar < 0) { daftar_rintangan.splice(i, 1); continue; }
                if(cekTabrakan(dino_x, dino_y, dino_lebar, dino_ting, obs.x, obs.y, obs.lebar, obs.tinggi)) { picuKekalahan(); break; }
            }

            if (daftar_rintangan.length < 2) {
                let last = daftar_rintangan[daftar_rintangan.length - 1];
                if (!last || last.x < LEBAR_LAYAR - (340 + Math.random()*180)) {
                    daftar_rintangan.push(buatRintanganBaru());
                }
            }
        }

        function cekTabrakan(x1, y1, w1, h1, x2, y2, w2, h2) {
            return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
        }

        function picuKekalahan() {
            status_layar = "GAMEOVER";
            mainkanSuaraLedakanKalah();
            if (skor > skor_tertinggi) skor_tertinggi = skor;
            partikel_ledakan = [];
            let wKarakter = database_karakter[id_karakter_terpilih].warna;
            for (let i = 0; i < 35; i++) {
                partikel_ledakan.push({
                    x: dino_x + dino_lebar/2, y: dino_y + dino_ting/2,
                    vx: (Math.random() - 0.5) * 12, vy: -4 - Math.random() * 5,
                    warna: [wKarakter, WARNA_MAGENTA_FLAT, WARNA_KUNING][Math.floor(Math.random()*3)],
                    size: 4 + Math.floor(Math.random()*5), life: 30 + Math.floor(Math.random()*20)
                });
            }
        }

        function resetGameTotal() {
            daftar_rintangan = [new Rintangan(LEBAR_LAYAR + 100, "bawah")];
            daftar_puing = []; daftar_koin_jalan = []; partikel_ledakan = []; partikel_roket = [];
            skor_jarak = 0; skor = 0; kecepatan_game = kecepatan_game_awal;
            menunduk = false; dino_ting = dino_tinggi_normal;
            dino_y = y_tanah_lintasan - dino_ting; kecepatan_y = 0;
            is_overdrive = false; waktu_berjalan = 0;
        }

        function randomRange(min, max) { return min + Math.random() * (max - min); }

        function memprosesAksiLompat() {
            if (status_layar === "MENU") {
                // FIXED: Memperbaiki bug panggil variabel id_karakter_terpilih agar tidak freeze
                id_character_di_menu = id_karakter_terpilih;
                resetGameTotal();
                status_layar = "BERMAIN";
                mainkanSuaraSuksesBeli();
                return;
            }
            if (status_layar === "GAMEOVER") {
                status_layar = "MENU";
                mainkanSuaraMenuKlik();
                return;
            }
            if (status_layar === "BERMAIN" && bisa_lompat && !menunduk) {
                kecepatan_y = kekuatan_lompat;
                bisa_lompat = false;
                mainkanSuaraLompat();
            }
        }

        function memprosesAksiTunduk(mulaiMenunduk) {
            if (status_layar !== "BERMAIN" || !bisa_lompat) return;
            if (mulaiMenunduk) {
                menunduk = true;
                dino_ting = dino_tinggi_tunduk;
                dino_y = y_tanah_lintasan - dino_tinggi_tunduk;
            } else {
                menunduk = false;
                dino_ting = dino_tinggi_normal;
                dino_y = y_tanah_lintasan - dino_tinggi_normal;
            }
        }

        document.getElementById("btnJump").addEventListener("touchstart", (e) => { e.preventDefault(); memprosesAksiLompat(); });
        document.getElementById("btnDuck").addEventListener("touchstart", (e) => { e.preventDefault(); memprosesAksiTunduk(true); });
        document.getElementById("btnDuck").addEventListener("touchend", (e) => { e.preventDefault(); memprosesAksiTunduk(false); });

        document.getElementById("btnJump").addEventListener("mousedown", memprosesAksiLompat);
        document.getElementById("btnDuck").addEventListener("mousedown", () => memprosesAksiTunduk(true));
        document.getElementById("btnDuck").addEventListener("mouseup", () => memprosesAksiTunduk(false));

        canvas.addEventListener("click", (e) => {
            if (status_layar !== "MENU") return;
            const rect = canvas.getBoundingClientRect();
            const clickX = ((e.clientX - rect.left) / rect.width) * LEBAR_LAYAR;
            const clickY = ((e.clientY - rect.top) / rect.height) * TINGGI_LAYAR;

            if (clickX >= LEBAR_LAYAR/2 - 195 && clickX <= LEBAR_LAYAR/2 - 145 && clickY >= 180 && clickY <= 230) {
                id_character_di_menu--;
                if (id_character_di_menu < 0) id_character_di_menu = database_karakter.length - 1;
                mainkanSuaraMenuKlik(); 
                return;
            }
            if (clickX >= LEBAR_LAYAR/2 + 135 && clickX <= LEBAR_LAYAR/2 + 185 && clickY >= 180 && clickY <= 230) {
                id_character_di_menu++;
                if (id_character_di_menu >= database_karakter.length) id_character_di_menu = 0;
                mainkanSuaraMenuKlik(); 
                return;
            }
            if (clickX >= LEBAR_LAYAR/2 - 120 && clickX <= LEBAR_LAYAR/2 + 120 && clickY >= 290 && clickY <= 340) {
                let sudahPunya = daftar_kepemilikan[id_character_di_menu];
                let infoKarakter = database_karakter[id_character_di_menu];

                if (sudahPunya) {
                    id_karakter_terpilih = id_character_di_menu;
                    localStorage.setItem("p_wann_active_id", id_karakter_terpilih);
                    mainkanSuaraSuksesBeli(); 
                } else {
                    if (total_koin >= infoKarakter.harga) {
                        total_koin -= infoKarakter.harga;
                        daftar_kepemilikan[id_character_di_menu] = true;
                        id_karakter_terpilih = id_character_di_menu;
                        localStorage.setItem("p_wann_koin", total_koin);
                        localStorage.setItem("p_wann_skins", JSON.stringify(daftar_kepemilikan));
                        localStorage.setItem("p_wann_active_id", id_karakter_terpilih);
                        mainkanSuaraSuksesBeli(); 
                    } else {
                        mainkanSuaraGagalBeli(); 
                    }
                }
            }
        });

        window.addEventListener("keydown", (e) => {
            if (e.code === "Space" || e.code === "ArrowUp") memprosesAksiLompat();
            if (e.code === "ArrowDown") memprosesAksiTunduk(true);
        });
        window.addEventListener("keyup", (e) => {
            if (e.code === "ArrowDown") memprosesAksiTunduk(false);
        });

        function engineLoop() {
            updateSiklusFisika();
            renderKomponenGame();
            requestAnimationFrame(engineLoop);
        }
        engineLoop();
    </script>
</body>
