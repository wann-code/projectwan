<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProjectWann Mecha Race</title>
    <style>
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body { background-color: #0d0c1d; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #gameContainer { position: relative; width: 100%; max-width: 800px; aspect-ratio: 800 / 450; background-color: #111; border: 4px solid #000; }
        canvas { width: 100%; height: 100%; display: block; }
        #controls { display: flex; width: 100%; max-width: 800px; gap: 10px; padding: 10px; }
        .btn { flex: 1; height: 60px; background: #2c3e50; color: #fff; font-weight: bold; border: 2px solid #000; }
    </style>
</head>
<body>
    <div id="gameContainer"><canvas id="gameCanvas" width="800" height="450"></canvas></div>
    <div id="controls">
        <button class="btn" id="btnDuck">TUNDUK</button>
        <button class="btn" id="btnJump">LOMPAT</button>
    </div>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let status = "MENU", skor = 0, y_tanah = 350, dino_x = 90, dino_y = 294, dino_h = 56, vel_y = 0, menunduk = false;
        let rintangan = [{x: 1200, y: 300, w: 25, h: 50}]; // Posisi rintangan awal JAUH di depan
        
        function loop() {
            ctx.fillStyle = "#0a0a16"; ctx.fillRect(0,0,800,450);
            if(status === "BERMAIN") {
                skor++;
                vel_y += 0.85; dino_y += vel_y;
                if(dino_y > 350 - dino_h) { dino_y = 350 - dino_h; vel_y = 0; }
                rintangan.forEach(r => {
                    r.x -= 7;
                    if(r.x < -50) r.x = 1200; // Reset rintangan jauh ke depan
                    if(dino_x < r.x + r.w && dino_x + 50 > r.x && dino_y < r.y + r.h && dino_y + dino_h > r.y) status = "GAMEOVER";
                });
            }
            // Draw Dino
            ctx.fillStyle = "#bdc3c7"; ctx.fillRect(dino_x, dino_y, 50, dino_h);
            // Draw Rintangan
            ctx.fillStyle = "#d81b60"; rintangan.forEach(r => ctx.fillRect(r.x, r.y, r.w, r.h));
            // UI
            ctx.fillStyle = "#fff"; ctx.font = "20px monospace"; ctx.fillText("SKOR: "+skor, 20, 30);
            if(status !== "BERMAIN") ctx.fillText("TAP LOMPAT UNTUK START", 280, 225);
            requestAnimationFrame(loop);
        }
        document.getElementById("btnJump").onclick = () => { if(status==="MENU" || status==="GAMEOVER") { skor=0; rintangan[0].x=1200; status="BERMAIN"; } else vel_y = -14; };
        document.getElementById("btnDuck").onmousedown = () => { menunduk=true; dino_h=34; dino_y=316; };
        document.getElementById("btnDuck").onmouseup = () => { menunduk=false; dino_h=56; dino_y=294; };
        loop();
    </script>
</body>
</html>
