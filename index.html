<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CyberDino 2077 Ultimate</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
    -webkit-user-select:none;
}

body{
    background:#090712;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    min-height:100vh;
    overflow:hidden;
    font-family:Courier New;
}

#gameContainer{
    width:100%;
    max-width:900px;
    aspect-ratio:16/9;
    border:2px solid #00f0ff;
    box-shadow:0 0 30px rgba(0,240,255,.25);
    position:relative;
}

canvas{
    width:100%;
    height:100%;
    display:block;
}

#mobileControls{
    width:100%;
    max-width:900px;
    display:flex;
    gap:15px;
    padding:15px;
}

.btn{
    flex:1;
    height:65px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    background:#151028;
    color:#00f0ff;
    border:2px solid #00f0ff;
    box-shadow:0 0 15px rgba(0,240,255,.25);
    touch-action:manipulation;
}

#btnDuck{
    color:#ff007f;
    border-color:#ff007f;
}

.btn:active{
    transform:scale(.95);
}
</style>
</head>
<body>

<div id="gameContainer">
<canvas id="gameCanvas" width="900" height="500"></canvas>
</div>

<div id="mobileControls">
<button class="btn" id="btnJump">LOMPAT</button>
<button class="btn" id="btnDuck">TUNDUK</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const W = 900;
const H = 500;
const ground = H - 100;

let score = 0;
let distance = 0;
let speed = 7;
let gameOver = false;
let shake = 0;

let totalCoins = localStorage.getItem("totalCoins") || 0;
let highscore = localStorage.getItem("highscore") || 0;
let skin = localStorage.getItem("skin") || "cyan";

let stars = [];
let obstacles = [];
let coins = [];
let particles = [];

for(let i=0;i<90;i++){
    stars.push({
        x:Math.random()*W,
        y:Math.random()*H,
        size:Math.random()*2
    });
}

const dino = {
    x:100,
    y:ground-60,
    w:50,
    h:60,
    vy:0,
    jump:-15,
    gravity:.8,
    duck:false,
    canJump:true
};

class Obstacle{
    constructor(){
        this.w = 30 + Math.random()*20;
        this.h = 40 + Math.random()*40;
        this.x = W + 100;
        this.y = ground - this.h;
    }
}

class Coin{
    constructor(){
        this.x = W + 100;
        this.y = 180 + Math.random()*120;
        this.size = 18;
        this.rot = 0;
    }
}

function spawnObstacle(){
    obstacles.push(new Obstacle());
}

function spawnCoin(){
    coins.push(new Coin());
}

spawnObstacle();

function collision(a,b){
    return a.x < b.x+b.w &&
           a.x+a.w > b.x &&
           a.y < b.y+b.h &&
           a.y+a.h > b.y;
}

function drawBackground(){

    let g = ctx.createLinearGradient(0,0,0,ground);
    g.addColorStop(0,"#12051f");
    g.addColorStop(1,"#3d114b");

    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    stars.forEach(s=>{
        s.x -= .3;

        if(s.x < 0){
            s.x = W;
            s.y = Math.random()*H;
        }

        ctx.fillStyle = "white";
        ctx.fillRect(s.x,s.y,s.size,s.size);
    });

    for(let i=0;i<12;i++){

        let x = (i*100 - (distance*.2)%1000);
        let h = 150 + (i%4)*40;

        ctx.fillStyle = "#1a1630";
        ctx.fillRect(x,ground-h,80,h);

        ctx.strokeStyle = "#00f0ff";
        ctx.strokeRect(x,ground-h,80,h);
    }

    ctx.fillStyle = "#0d0a19";
    ctx.fillRect(0,ground,W,100);

    ctx.strokeStyle = "#00f0ff";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0,ground);
    ctx.lineTo(W,ground);
    ctx.stroke();
}

function drawDino(){

    if(skin === "cyan"){
        ctx.fillStyle = "#d2dceb";
    }
    else if(skin === "gold"){
        ctx.fillStyle = "#ffd700";
    }
    else if(skin === "matrix"){
        ctx.fillStyle = "#00ff88";
    }
    else{
        ctx.fillStyle = "#ff007f";
    }

    ctx.fillRect(dino.x,dino.y,dino.w,dino.h);

    ctx.fillStyle = "#00f0ff";
    ctx.fillRect(dino.x+35,dino.y+15,5,5);

    ctx.fillStyle = "#ff007f";
    ctx.fillRect(dino.x+10,dino.y+50,10,10);
    ctx.fillRect(dino.x+30,dino.y+50,10,10);
}

function drawHUD(){

    ctx.fillStyle = "#00f0ff";
    ctx.font = "bold 20px Courier New";

    ctx.fillText("SCORE: " + score,20,40);
    ctx.fillText("BEST: " + highscore,20,70);

    ctx.fillStyle = "#ffd700";
    ctx.fillText("COINS: " + totalCoins,20,100);

    ctx.fillStyle = "white";
    ctx.fillText("1 CYAN",650,40);
    ctx.fillText("2 GOLD (20)",650,70);
    ctx.fillText("3 MATRIX (50)",650,100);

    if(speed >= 12){
        ctx.fillStyle = "#fff000";
        ctx.fillText("⚡ OVERDRIVE ⚡",350,50);
    }
}

function explode(){

    if(navigator.vibrate){
        navigator.vibrate([200,100,200]);
    }

    for(let i=0;i<40;i++){
        particles.push({
            x:dino.x+20,
            y:dino.y+20,
            vx:(Math.random()-.5)*12,
            vy:(Math.random()-.5)*12,
            size:3+Math.random()*4,
            life:40
        });
    }
}

function reset(){
    obstacles=[];
    coins=[];
    particles=[];

    score=0;
    distance=0;
    speed=7;

    dino.y=ground-60;
    dino.vy=0;

    gameOver=false;

    spawnObstacle();
}

function update(){

    if(gameOver){

        particles.forEach(p=>{
            p.x += p.vx;
            p.y += p.vy;
            p.life--;

            ctx.fillStyle = "#ff007f";
            ctx.fillRect(p.x,p.y,p.size,p.size);
        });

        return;
    }

    distance += speed;
    score = Math.floor(distance*.05);

    if(score > highscore){
        highscore = score;
        localStorage.setItem("highscore",highscore);
    }

    if(score > 0 && score % 100 === 0){
        speed += .003;
    }

    dino.vy += dino.gravity;
    dino.y += dino.vy;

    if(dino.y >= ground-dino.h){
        dino.y = ground-dino.h;
        dino.vy = 0;
        dino.canJump = true;
    }

    obstacles.forEach((o,index)=>{

        o.x -= speed;

        ctx.fillStyle = "rgba(255,0,127,.2)";
        ctx.fillRect(o.x-15,o.y,o.w,o.h);

        ctx.fillStyle = "#ff007f";
        ctx.fillRect(o.x,o.y,o.w,o.h);

        if(o.x + o.w < 0){
            obstacles.splice(index,1);
            spawnObstacle();
        }

        if(collision(dino,o)){
            gameOver = true;
            shake = 10;
            explode();
        }
    });

    if(Math.random() < .01 && coins.length < 3){
        spawnCoin();
    }

    coins.forEach((c,index)=>{

        c.x -= speed;
        c.rot += .1;

        ctx.save();
        ctx.translate(c.x,c.y);
        ctx.rotate(c.rot);

        ctx.fillStyle = "#ffd700";
        ctx.beginPath();
        ctx.arc(0,0,c.size/2,0,Math.PI*2);
        ctx.fill();

        ctx.restore();

        if(c.x < -20){
            coins.splice(index,1);
        }

        if(collision(dino,{x:c.x,y:c.y,w:c.size,h:c.size})){
            totalCoins++;
            localStorage.setItem("totalCoins",totalCoins);
            coins.splice(index,1);
        }
    });
}

function render(){

    ctx.clearRect(0,0,W,H);

    ctx.save();

    if(speed >= 12){
        ctx.scale(1.02,1.02);
        ctx.translate(-10,-5);
    }

    if(shake > 0){
        ctx.translate(
            Math.random()*shake-shake/2,
            Math.random()*shake-shake/2
        );

        shake--;
    }

    drawBackground();
    drawDino();
    drawHUD();

    if(gameOver){

        ctx.fillStyle = "rgba(0,0,0,.6)";
        ctx.fillRect(0,0,W,H);

        ctx.fillStyle = "#ff007f";
        ctx.font = "bold 42px Courier New";
        ctx.fillText("CRITICAL ERROR",260,220);

        ctx.fillStyle = "#00f0ff";
        ctx.font = "bold 20px Courier New";
        ctx.fillText("TAP JUMP TO RESTART",300,270);
    }

    ctx.restore();
}

function loop(){
    update();
    render();
    requestAnimationFrame(loop);
}

function jump(){

    if(gameOver){
        reset();
        return;
    }

    if(dino.canJump){
        dino.vy = dino.jump;
        dino.canJump = false;
    }
}

function duck(v){

    if(v){
        dino.h = 35;
        dino.y = ground-35;
    }
    else{
        dino.h = 60;
        dino.y = ground-60;
    }
}

window.addEventListener("keydown",e=>{

    if(e.code === "Space" || e.code === "ArrowUp"){
        jump();
    }

    if(e.code === "ArrowDown"){
        duck(true);
    }
});

window.addEventListener("keyup",e=>{

    if(e.code === "ArrowDown"){
        duck(false);
    }
});

window.addEventListener("keypress",e=>{

    if(e.key === "1"){
        skin = "cyan";
    }

    if(e.key === "2" && totalCoins >= 20){
        skin = "gold";
    }

    if(e.key === "3" && totalCoins >= 50){
        skin = "matrix";
    }

    localStorage.setItem("skin",skin);
});

btnJump.addEventListener("touchstart",e=>{
    e.preventDefault();
    jump();
});

btnDuck.addEventListener("touchstart",e=>{
    e.preventDefault();
    duck(true);
});

btnDuck.addEventListener("touchend",e=>{
    e.preventDefault();
    duck(false);
});

// fullscreen mobile

document.body.addEventListener("touchstart",()=>{
    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen();
    }
},{once:true});

loop();
</script>

</body>
</html>
