<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberDino 2077: ProjectWann Comic Style</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            touch-action: none; /* Mencegah zoom/scroll browser saat tap cepat */
        }
        body {
            background-color: #0d0c1d;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 800 / 450;
            background-color: #111;
            /* Outline tebal khas komik pada border game */
            border: 4px solid #000; 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const LEBAR_LAYAR = 800;
        const TINGGI_LAYAR = 450;
        const y_tanah_lintasan = TINGGI_LAYAR - 100;

        // PALET WARNA FLAT COMIC (Tanpa Glow, Tanpa Neon, Anti Pusing)
        const WARNA_HITAM = "#000000"; // Untuk outline tebal
        const WARNA_PUTIH = "#FFFFFF";
        const WARNA_BG_COMIC = "#1a1a2e";
        const WARNA_GEDUNG_COMIC = "#33334d";
        const WARNA_GEDUNG_FAJAR = "#5e3a6b";
        const WARNA_JENDELA = "#f7dc6f"; // Kuning flat diam
        const WARNA_METAL_MUDA = "#bdc3c7";
        const WARNA_METAL_TUA = "#7f8c8d";
        const WARNA_MAGENTA_FLAT = "#d81b60";
        const WARNA_CYAN_FLAT = "#00acc1";

        let kecepatan_game_awal = 6.0;
        let kecepatan_game = kecepatan_game_awal;
        let skor_jarak = 0;
        let skor = 0;
        let skor_tertinggi = 0;
        let game_over = false;
        let waktu_berjalan = 0;
        let scroll_semesta = 0;

        // Reset state mekanik
        let intensity_getar = 0;
        let overdrive_timer = 0;
        let is_overdrive = false;

        const dino_lebar = 50;
        const dino_tinggi_normal = 56;
        const dino_tinggi_tunduk = 34;
        let dino_ting = dino_tinggi_normal;

        let dino_x = 90;
        let dino_y = y_tanah_lintasan - dino_tinggi_normal;
        let kecepatan_y = 0;
        let gravitasi = 0.85;
        let kekuatan_lompat = -14.5;
        let bisa_lompat = true;
        let menunduk = false;

        // Variabel kontrol touch screen ala Dino Chrome
        let touch_start_time = 0;
        let is_holding = false;
        const hold_threshold = 200; // ms, batas waktu tap cepat vs tekan lama

        let daftar_rintangan = [];
        let daftar_puing = [];
        let partikel_ledakan = [];
        let partikel_roket = [];

        // Audio System (Mute sementara)
        let audioCtx = null;
        function inisialisasiAudio() {}
        function mainkanSuaraLompat() {}
        function mainkanSuaraLedakanKalah() {}
        function mainkanSuaraLaserBackground() {}

        // Data Gedung Gaya Komik ( Outline tebal, Warna Blok, Lampu Diam)
        let data_gedung = [];
        for (let i = 0; i < 12; i++) {
            let lebarGedung = 100 + Math.floor(Math.random() * 50);
            let tinggiGedung = 180 + Math.floor(Math.random() * 100);
            let susunanJendela = [];
            
            for (let wy = (y_tanah_lintasan - tinggiGedung) + 30; wy < y_tanah_lintasan - 30; wy += 28) {
                for (let wx = 0; wx < lebarGedung - 28; wx += 20) {
                    if (Math.random() > 0.4) {
                        susunanJendela.push({ relX: wx + 14, y: wy });
                    }
                }
            }

            data_gedung.push({
                x_ratio: i * 160,
                lebar: lebarGedung,
                tinggi: tinggiGedung,
                jendela: susunanJendela
            });
        }

        class Rintangan {
            constructor(x, tipeKategori = "bawah") {
                this.tipe_kategori = tipeKategori;
                if (tipeKategori === "bawah") {
                    let sub = ["tunggal", "ganda", "tembok"][Math.floor(Math.random() * 3)];
                    if (sub === "tunggal") {
                        this.tipe = "laser_tunggal"; this.lebar = 24; this.tinggi = 60 + Math.floor(Math.random() * 20);
                    } else if (sub === "ganda") {
                        this.tipe = "laser_ganda"; this.lebar = 50; this.tinggi = 55;
                    } else {
                        this.tipe = "tembok_baja"; this.lebar = 40; this.tinggi = 45;
                    }
                    this.x = x; this.y = y_tanah_lintasan - this.tinggi;
                } else {
                    this.tipe = "terbang"; this.lebar = 50; this.tinggi = 35; this.x = x;
                    this.y = Math.random() > 0.5 ? y_tanah_lintasan - 85 : y_tanah_lintasan - 55;
                }
            }
        }

        function buatRintanganBaru() {
            let kategori = (skor >= 500 && Math.random() > 0.5) ? "atas" : "bawah";
            return new Rintangan(LEBAR_LAYAR + 100, kategori);
        }

        daftar_rintangan.push(new Rintangan(LEBAR_LAYAR + 200, "bawah"));

        // ==========================================
        // ENGINE RENDERING COMIC ART STYLE
        // ==========================================
        function renderKomponenGame() {
            ctx.clearRect(0, 0, LEBAR_LAYAR, TINGGI_LAYAR);
            ctx.save();
            
            // 1. Gambar Langit Comic ( Gradasi Flat Blok, Tanpa Glow)
            if (skor < 100) {
                ctx.fillStyle = WARNA_BG_COMIC;
                ctx.fillRect(0, 0, LEBAR_LAYAR, TINGGI_LAYAR);
            } else {
                ctx.fillStyle = WARNA_GEDUNG_FAJAR; // Ganti langit cerah fajar saat skor naik
                ctx.fillRect(0, 0, LEBAR_LAYAR, y_tanah_lintasan);
            }

            // 2. Gambar Gedung Comic Style ( Outline Hitam Tebal, Warna Flat)
            ctx.lineWidth = 3; // Outline tebal khas komik
            ctx.strokeStyle = WARNA_HITAM;
            let scroll_dekat = (waktu_berjalan * kecepatan_game * 0.05) % 1600;
            
            data_gedung.forEach((g, idx) => {
                let cx = (idx * 160) - scroll_dekat;
                if (cx < -180) cx += 1600;
                let cy = y_tanah_lintasan - g.tinggi;
                
                // Isi Gedung (Flat Color)
                ctx.fillStyle = skor < 100 ? WARNA_GEDUNG_COMIC : "#4a2a5e";
                ctx.fillRect(cx, cy, g.lebar, g.tinggi);
                // Outline Gedung (Wajib)
                ctx.strokeRect(cx, cy, g.lebar, g.tinggi);

                // Lampu Jendela Komik Diam (Anti Pusing)
                ctx.fillStyle = WARNA_JENDELA;
                ctx.strokeStyle = WARNA_HITAM; ctx.lineWidth = 1.5;
                g.jendela.forEach(j => {
                    ctx.fillRect(cx + j.relX, j.y, 10, 14);
                    ctx.strokeRect(cx + j.relX, j.y, 10, 14); // Outline jendela
                });
            });

            // Watermark (Gaya Komik Transparan)
            ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
            ctx.font = "bold 50px 'Courier New'";
            let mt = ctx.measureText("projectwann");
            ctx.fillText("projectwann", LEBAR_LAYAR/2 - mt.width/2, 200);

            // 3. Grid Jalan Utama Comic
            ctx.fillStyle = "#111"; ctx.fillRect(0, y_tanah_lintasan, LEBAR_LAYAR, 100);
            ctx.strokeStyle = WARNA_HITAM; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, y_tanah_lintasan); ctx.lineTo(LEBAR_LAYAR, y_tanah_lintasan); ctx.stroke();
            
            ctx.strokeStyle = "#333"; ctx.lineWidth = 2;
            let offset = scroll_semesta % 50;
            for (let x = -offset; x < LEBAR_LAYAR + 50; x += 50) {
                ctx.beginPath(); ctx.moveTo(x, y_tanah_lintasan); ctx.lineTo(x - 50, TINGGI_LAYAR); ctx.stroke();
            }

            // 4. Rintangan Comic Style ( Outline Hitam)
            ctx.strokeStyle = WARNA_HITAM; ctx.lineWidth = 3;
            daftar_rintangan.forEach(obs => {
                if (obs.tipe === "laser_tunggal") {
                    ctx.fillStyle = WARNA_MAGENTA_FLAT; ctx.fillRect(obs.x + 4, obs.y, obs.lebar - 8, obs.tinggi);
                    ctx.strokeRect(obs.x + 4, obs.y, obs.lebar - 8, obs.tinggi);
                    ctx.fillStyle = WARNA_PUTIH; ctx.fillRect(obs.x + 9, obs.y + 6, obs.lebar - 18, obs.tinggi - 12);
                } else if (obs.tipe === "laser_ganda") {
                    ctx.fillStyle = WARNA_MAGENTA_FLAT; 
                    ctx.fillRect(obs.x, obs.y, 18, obs.tinggi); ctx.strokeRect(obs.x, obs.y, 18, obs.tinggi);
                    ctx.fillRect(obs.x + obs.lebar - 18, obs.y, 18, obs.tinggi); ctx.strokeRect(obs.x + obs.lebar - 18, obs.y, 18, obs.tinggi);
                } else if (obs.tipe === "tembok_baja") {
                    ctx.fillStyle = WARNA_METAL_TUA; ctx.fillRect(obs.x, obs.y, obs.lebar, obs.tinggi); ctx.strokeRect(obs.x, obs.y, obs.lebar, obs.tinggi);
                    ctx.fillStyle = WARNA_ORANYE; ctx.beginPath(); ctx.arc(obs.x + obs.lebar/2, obs.y + obs.tinggi/2, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                } else if (obs.tipe === "terbang") {
                    ctx.fillStyle = WARNA_METAL_TUA; ctx.fillRect(obs.x, obs.y, obs.lebar, obs.tinggi); ctx.strokeRect(obs.x, obs.y, obs.lebar, obs.tinggi);
                    ctx.fillStyle = WARNA_CYAN_FLAT; ctx.beginPath(); ctx.arc(obs.x + 10, obs.y + obs.tinggi/2, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                }
            });

            // Roket Jet Dino Comic Style
            partikel_roket.forEach(p => {
                ctx.fillStyle = p.warna; ctx.fillRect(p.x, p.y, p.size, p.size);
            });

            // 5. Dino Cyborg DETAIL COMIC ( Outline Tebal)
            if (!game_over) {
                ctx.strokeStyle = WARNA_HITAM; ctx.lineWidth = 3;
                if (!menunduk) {
                    ctx.fillStyle = WARNA_METAL_MUDA; ctx.fillRect(dino_x, dino_y + 14, 34, 26); ctx.strokeRect(dino_x, dino_y + 14, 34, 26);
                    ctx.strokeStyle = WARNA_HITAM; ctx.lineWidth = 1.5; ctx.strokeRect(dino_x + 5, dino_y + 18, 24, 18); // Detail armor

                    ctx.fillStyle = WARNA_METAL_MUDA; ctx.lineWidth = 3; ctx.strokeStyle = WARNA_HITAM;
                    ctx.fillRect(dino_x + 18, dino_y - 4, 32, 22); ctx.strokeRect(dino_x + 18, dino_y - 4, 32, 22);
                    // Taring
                    ctx.fillStyle = WARNA_CYAN_FLAT; ctx.fillRect(dino_x + 36, dino_y + 12, 5, 5); ctx.fillRect(dino_x + 44, dino_y + 12, 5, 5);

                    // Mata Comic
                    ctx.fillStyle = WARNA_MAGENTA_FLAT; ctx.beginPath(); ctx.arc(dino_x + 36, dino_y + 3, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();

                    // Ekor Mekanik
                    ctx.fillStyle = WARNA_METAL_TUA;
                    ctx.beginPath(); ctx.moveTo(dino_x, dino_y + 24); ctx.lineTo(dino_x - 16, dino_y + 16); ctx.lineTo(dino_x - 10, dino_y + 34); ctx.closePath(); ctx.fill(); ctx.stroke();
                } else {
                    // Dino Tunduk Comic
                    ctx.fillStyle = WARNA_METAL_MUDA; ctx.fillRect(dino_x - 2, dino_y + 8, 42, 20); ctx.strokeRect(dino_x - 2, dino_y + 8, 42, 20);
                    ctx.fillStyle = WARNA_METAL_MUDA;
                    ctx.fillRect(dino_x + 32, dino_y + 4, 24, 18); ctx.strokeRect(dino_x + 32, dino_y + 4, 24, 18);
                    // Taring nunduk
                    ctx.fillStyle = WARNA_CYAN_FLAT; ctx.fillRect(dino_x + 48, dino_y + 16, 5, 4);

                    ctx.fillStyle = WARNA_MAGENTA_FLAT; ctx.beginPath(); ctx.arc(dino_x + 44, dino_y + 8, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();

                    // Ekor Nunduk
                    ctx.fillStyle = WARNA_METAL_TUA;
                    ctx.beginPath(); ctx.moveTo(dino_x - 2, dino_y + 14); ctx.lineTo(dino_x - 16, dino_y + 22); ctx.lineTo(dino_x - 2, dino_y + 24); ctx.closePath(); ctx.fill(); ctx.stroke();
                }

                // Kaki Robotik Comic
                ctx.fillStyle = WARNA_METAL_TUA; ctx.strokeStyle = WARNA_HITAM; ctx.lineWidth = 2.5;
                let ayun = dino_y === (y_tanah_lintasan - dino_ting) ? Math.sin(waktu_berjalan * 0.35) * 6 : 0;
                ctx.fillRect(dino_x + 8, dino_y + dino_ting - 14, 9, 11 + ayun); ctx.strokeRect(dino_x + 8, dino_y + dino_ting - 14, 9, 11 + ayun);
                ctx.fillRect(dino_x + 22, dino_y + dino_ting - 14, 9, 11 - ayun); ctx.strokeRect(dino_x + 22, dino_y + dino_ting - 14, 9, 11 - ayun);
            } else {
                partikel_ledakan.forEach(p => {
                    ctx.fillStyle = p.warna; ctx.fillRect(p.x, p.y, p.size, p.size);
                });
            }

            // HUD Comic
            ctx.fillStyle = (skor < 100) ? WARNA_CYAN_FLAT : WARNA_PUTIH;
            ctx.font = "bold 20px 'Courier New'";
            ctx.fillText(`STEPS: ${String(skor).padStart(4, '0')} m`, 25, 35);
            ctx.fillStyle = "#7882a0";
            ctx.fillText(`MAX: ${String(skor_tertinggi).padStart(4, '0')} m`, 25, 62);

            if (game_over) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; ctx.fillRect(0, 0, LEBAR_LAYAR, TINGGI_LAYAR);
                ctx.fillStyle = WARNA_MAGENTA_FLAT; ctx.font = "bold 40px 'Courier New'";
                ctx.fillText("CRITICAL ERROR", LEBAR_LAYAR/2 - 160, TINGGI_LAYAR/2 - 15);
                ctx.fillStyle = WARNA_CYAN_FLAT; ctx.font = "bold 20px 'Courier New'";
                ctx.fillText("> TAP SCREEN TO REBOOT", LEBAR_LAYAR/2 - 120, TINGGI_LAYAR/2 + 35);
            }

            if (!game_over && skor < 10 && waktu_berjalan < 200) {
                 ctx.fillStyle = WARNA_PUTIH; ctx.font = "bold 18px 'Courier New'";
                 ctx.fillText("[TAP] LOMPAT  |  [HOLD] NUNDUK", LEBAR_LAYAR/2 - 150, TINGGI_LAYAR - 30);
            }

            ctx.restore();
        }

        // ==========================================
        // GAME LOGIC & FISIKA (Tanpa Getar)
        // ==========================================
        function updateSiklusFisika() {
            waktu_berjalan++;
            
            if (!game_over) {
                // Kecepatan dinaikkan jika skor >= 200
                if (skor >= 200) {
                    is_overdrive = true;
                } else {
                    is_overdrive = false;
                }

                let speed_aktif = kecepatan_game + (is_overdrive ? 5.5 : 0);
                scroll_semesta += speed_aktif;
                skor_jarak += speed_aktif * 0.02;
                skor = Math.floor(skor_jarak);

                if (skor > 0 && skor % 100 === 0) {
                    kecepatan_game = kecepatan_game_awal + (skor / 130.0);
                }

                // Fisika Lompat
                kecepatan_y += gravitasi;
                dino_y += kecepatan_y;
                let batas = y_tanah_lintasan - dino_ting;
                if (dino_y >= batas) {
                    dino_y = batas; kecepatan_y = 0; bisa_lompat = true;
                }

                // Efek Roket saat melompat
                if (dino_y < batas && !menunduk) {
                    for(let k=0; k<2; k++) {
                        partikel_roket.push({
                            x: dino_x + 5, y: dino_y + 28 + Math.random()*8,
                            vx: - (2 + Math.random()*3), vy: 1 + Math.random()*2,
                            warna: Math.random() > 0.4 ? WARNA_ORANYE : WARNA_KUNING,
                            size: 3 + Math.random()*3, life: 10 + Math.random()*10
                        });
                    }
                }
                for (let i = partikel_roket.length - 1; i >= 0; i--) {
                    let p = partikel_roket[i]; p.x += p.vx; p.y += p.vy; p.life--;
                    if (p.life <= 0) partikel_roket.splice(i, 1);
                }

                // Gerakan Puing Meteor (Skor >= 300)
                if (skor >= 300 && Math.random() < 0.02 && daftar_puing.length < 3) {
                    daftar_puing.push({
                        size: 10 + Math.floor(Math.random()*8), x: 400 + Math.random()*500, y: -20,
                        vx: -6 - Math.random()*2, vy: 6 + Math.random()*3
                    });
                }
                ctx.strokeStyle = WARNA_HITAM; ctx.lineWidth = 2; // Outline puing
                for (let i = daftar_puing.length - 1; i >= 0; i--) {
                    let p = daftar_puing[i]; p.x += p.vx; p.y += p.vy;
                    if (p.y > TINGGI_LAYAR || p.x < 0) { daftar_puing.splice(i, 1); continue; }
                    if(cekTabrakan(dino_x, dino_y, dino_lebar, dino_ting, p.x, p.y, p.size, p.size)) {
                        picuKekalahan(); break;
                    }
                }

                // Gerakan Rintangan Darat
                for (let i = daftar_rintangan.length - 1; i >= 0; i--) {
                    let obs = daftar_rintangan[i]; obs.x -= speed_aktif;
                    if (obs.x + obs.lebar < 0) { daftar_rintangan.splice(i, 1); continue; }
                    if(cekTabrakan(dino_x, dino_y, dino_lebar, dino_ting, obs.x, obs.y, obs.lebar, obs.tinggi)) {
                        picuKekalahan(); break;
                    }
                }

                if (daftar_rintangan.length < 2) {
                    let last = daftar_rintangan[daftar_rintangan.length - 1];
                    if (!last || last.x < LEBAR_LAYAR - (320 + Math.random()*200)) {
                        daftar_rintangan.push(buatRintanganBaru());
                    }
                }
            } else {
                // Efek partikel kalah
                partikel_ledakan.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--; });
            }
        }

        function cekTabrakan(x1, y1, w1, h1, x2, y2, w2, h2) {
            return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
        }

        function picuKekalahan() {
            game_over = true; 
            intensity_getar = 0; // Hapus efek getar total mutlak pas nabrak
            if (skor > skor_tertinggi) skor_tertinggi = skor;
            partikel_ledakan = [];
            for (let i = 0; i < 35; i++) {
                partikel_ledakan.push({
                    x: dino_x + dino_lebar/2, y: dino_y + dino_ting/2,
                    vx: (Math.random() - 0.5) * 12, vy: -4 - Math.random() * 5,
                    warna: [WARNA_CYAN_FLAT, WARNA_MAGENTA_FLAT, WARNA_KUNING][Math.floor(Math.random()*3)],
                    size: 4 + Math.floor(Math.random()*5), life: 30 + Math.floor(Math.random()*20)
                });
            }
        }

        function resetGameTotal() {
            daftar_rintangan = [new Rintangan(LEBAR_LAYAR + 100, "bawah")];
            daftar_puing = []; partikel_ledakan = []; partikel_roket = [];
            skor_jarak = 0; skor = 0; kecepatan_game = kecepatan_game_awal;
            menunduk = false; dino_ting = dino_tinggi_normal;
            dino_y = y_tanah_lintasan - dino_ting; kecepatan_y = 0;
            game_over = false; waktu_berjalan = 0;
        }

        // ==========================================
        // HANDLER KONTROL FULL TOUCH SCREEN (Ala Chrome Dino)
        // ==========================================
        function aksiMulaiSentuh(e) {
            e.preventDefault(); // Mencegah scroll/zoom browser
            if (game_over) return;
            touch_start_time = Date.now();
            is_holding = false;
        }

        function aksiSelesaiSentuh(e) {
            e.preventDefault();
            if (game_over) { resetGameTotal(); return; }
            
            let touch_duration = Date.now() - touch_start_time;

            if (touch_duration < hold_threshold) {
                // TAP CEPAT -> LOMPAT
                if (bisa_lompat && !menunduk) { 
                    kecepatan_y = kekuatan_lompat; bisa_lompat = false; 
                    mainkanSuaraLompat();
                }
            }
            // Jika sedang menunduk (karena hold), berhentikan nunduk saat jari dilepas
            if (menunduk) {
                menunduk = false; dino_ting = dino_tinggi_normal; dino_y = y_tanah_lintasan - dino_tinggi_normal;
                is_holding = false;
            }
        }

        // Cek secara rutin apakah jari sedang menahan layar (untuk Nunduk)
        function cekInputHold() {
            if (!game_over && touch_start_time !== 0 && !menunduk) {
                let current_hold_duration = Date.now() - touch_start_time;
                if (current_hold_duration >= hold_threshold) {
                    // JARI DITAHAN LAMA -> NUNDUK
                    if (bisa_lompat) {
                        menunduk = true; dino_ting = dino_tinggi_tunduk; dino_y = y_tanah_lintasan - dino_tinggi_tunduk;
                        is_holding = true;
                    }
                }
            }
        }

        // Event Listener Touch Screen pada Canvas full
        canvas.addEventListener("touchstart", aksiMulaiSentuh);
        canvas.addEventListener("touchend", aksiSelesaiSentuh);
        canvas.addEventListener("touchcancel", aksiSelesaiSentuh); // Jaga-jaga jika sentuhan terganggu

        // Fallback Mouse untuk tes di PC
        canvas.addEventListener("mousedown", (e) => { touch_start_time = Date.now(); is_holding = false; });
        canvas.addEventListener("mouseup", (e) => {
            if (game_over) { resetGameTotal(); return; }
            let duration = Date.now() - touch_start_time;
            if (duration < hold_threshold) {
                 if (bisa_lompat && !menunduk) { kecepatan_y = kekuatan_lompat; bisa_lompat = false; }
            }
            if (menunduk) { menunduk = false; dino_ting = dino_tinggi_normal; dino_y = y_tanah_lintasan - dino_tinggi_normal; }
            touch_start_time = 0;
        });

        // Loop Detak Game Utama
        function engineLoop() {
            cekInputHold(); // Cek input hold setiap frame
            updateSiklusFisika();
            renderKomponenGame();
            requestAnimationFrame(engineLoop);
        }
        engineLoop();
    </script>
</body>
</html>
